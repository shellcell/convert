# nfpm configuration for building .deb, .rpm and .apk packages.
#
# Driven by environment variables so one config covers every arch:
#   PKG_VERSION  package version (without a leading "v")
#   PKG_ARCH     nfpm arch, e.g. amd64, arm64
#   PKG_BIN      path to the prebuilt cnvrt binary for that arch
#
# See the `packages` target in the Makefile, which sets these per build.
name: cnvrt
arch: ${PKG_ARCH}
platform: linux
version: ${PKG_VERSION}
section: utils
priority: optional
maintainer: Polina Simonenko <rabarbrablad@gmail.com>
description: |
  Interactive CLI for file conversion.
  cnvrt converts files between formats by driving the best available backend
  tool (FFmpeg, ImageMagick, Pandoc, LibreOffice and more), interactively or
  in scripted batches, and handles archives and structured data on its own.
vendor: shellcell
homepage: https://github.com/shellcell/cnvrt
license: MIT
contents:
  - src: ${PKG_BIN}
    dst: /usr/bin/cnvrt
  - src: ./docs/cnvrt.1
    dst: /usr/share/man/man1/cnvrt.1
  - src: ./completions/cnvrt.bash
    dst: /usr/share/bash-completion/completions/cnvrt
  - src: ./completions/cnvrt.fish
    dst: /usr/share/fish/vendor_completions.d/cnvrt.fish
  - src: ./completions/_cnvrt
    dst: /usr/share/zsh/site-functions/_cnvrt
