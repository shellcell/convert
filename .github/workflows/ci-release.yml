name: CI and Release

on:
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: read

jobs:
  test:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

      - name: Install mandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y mandoc

      - name: Build release artifacts
        run: make release VERSION="${GITHUB_REF_NAME}"

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Build distro packages (.deb/.rpm/.apk)
        run: make packages VERSION="${GITHUB_REF_NAME}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            dist/*.tar.gz dist/*.deb dist/*.rpm dist/*.apk dist/checksums.txt

  bump-tap:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew formula bump
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          gh api repos/shellcell/homebrew-tap/dispatches \
            -f event_type=bump-formula \
            -f 'client_payload[formula]=cnvrt' \
            -f "client_payload[version]=${GITHUB_REF_NAME#v}"

  publish-packages:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger package repo publish
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          gh api repos/shellcell/packages/dispatches \
            -f event_type=publish-packages \
            -f "client_payload[project]=${GITHUB_REPOSITORY#*/}" \
            -f "client_payload[version]=${GITHUB_REF_NAME#v}"

  aur-bump:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AUR bumps (source + -bin)
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          name="${GITHUB_REPOSITORY#*/}"
          ver="${GITHUB_REF_NAME#v}"
          for pkg in "$name" "$name-bin"; do
            gh api repos/shellcell/aur/dispatches \
              -f event_type=aur-bump \
              -f "client_payload[package]=$pkg" \
              -f "client_payload[version]=$ver"
          done
